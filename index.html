<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Login / Sign Up</title>
  <link rel="stylesheet" href="styles.css">
</head>

<body>
  <main class="page">
    <section class="card">

      <h1 class="brand">StyleMarket</h1>

      <div class="tabs">
        <button id="tabLogin" class="tab is-active" type="button">Login</button>
        <button id="tabSignup" class="tab" type="button">Sign Up</button>
        <span class="tabs__slider"></span>
      </div>

      <p class="subtext" id="subtext">Welcome back. Log in to continue.</p>

      <!-- Login Form -->
      <form id="loginForm" class="form is-visible">
        <label class="field">
          <span>Email</span>
          <input type="email" id="loginEmail" required>
        </label>

        <label class="field">
          <span>Password</span>
          <input type="password" id="loginPassword" placeholder="••••••••" required>
        </label>

        <button class="btn" type="submit">Login</button>
        <p class="hint" id="loginHint"></p>
      </form>

      <!-- Sign Up Form -->
      <form id="signupForm" class="form">
        <label class="field">
          <span>Name</span>
          <input type="text" id="signupName" required>
        </label>

        <label class="field">
          <span>Email</span>
          <input type="email" id="signupEmail" required>
        </label>

        <label class="field">
          <span>Password</span>
          <input type="password" id="signupPassword" placeholder="••••••••" required>
        </label>

        <label class="field">
          <span>Confirm Password</span>
          <input type="password" id="signupConfirm" placeholder="••••••••" required>
        </label>

        <button class="btn" type="submit">Create Account</button>
        <p class="hint" id="signupHint"></p>
      </form>

    </section>
  </main>

  <script src="app.js"></script>
</body>

</html>

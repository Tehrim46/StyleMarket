<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>StyleMarket Sign Up</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>

    <h1 class="title">StyleMarket</h1>
    <div class="outer-box">
        <div class="inner-box">
            <h2>Sign Up</h2>

            <form>

                <label>Email</label>
                <input type="email">

                <label>Password</label>
                <input type="password">

                <label>Confirm Password</label>
                <input type="password">

                <button type="submit">
                    Create Account
                </button>
            </form>
        </div>
    </div>
<script src="app.css"></script>
</body>
</html>
